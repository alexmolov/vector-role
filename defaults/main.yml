---
vector_version: "0.39.0"
vector_package: "vector-{{ vector_version }}-1.x86_64.rpm"
vector_download_url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-1.x86_64.rpm"
vector_config_dir: "/etc/vector"
vector_config_file: "{{ vector_config_dir }}/vector.yaml"
vector_clickhouse_host: "127.0.0.1"
vector_clickhouse_database: "logs"
vector_clickhouse_table: "vector_message"

vector_package_debian: "vector_{{ vector_version }}-1_amd64.deb"
vector_download_url_debian: "https://packages.timber.io/vector/{{ vector_version }}/vector_{{ vector_version }}-1_amd64.deb"